name: Release Stcode

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version without the leading v"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-stcode-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_CHANNEL: stable

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }} DMG
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 64
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: stcode-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            stcode-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Install cargo-bundle
        shell: bash
        run: |
          if ! cargo bundle --help >/dev/null 2>&1; then
            cargo install cargo-bundle --locked
          fi

      - name: Import macOS signing certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12" ]]; then
            echo "No signing certificate configured; using ad-hoc signing."
            exit 0
          fi

          keychain="$RUNNER_TEMP/stcode-release.keychain-db"
          certificate="$RUNNER_TEMP/stcode-release.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate"

          security create-keychain -p "" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "" "$keychain"
          security import "$certificate" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$keychain"

          if [[ -n "$MACOS_CODESIGN_IDENTITY" ]]; then
            echo "STCODE_CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "STCODE_CODESIGN_IDENTITY=Developer ID Application" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        shell: bash
        env:
          ZED_APP_VERSION: ${{ steps.release.outputs.version }}
          ZED_COMMIT_SHA: ${{ github.sha }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: script/stcode-release-macos "${{ steps.release.outputs.version }}" "${{ matrix.target }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: stcode-macos-${{ matrix.arch }}
          path: |
            target/stcode-release/Stcode-${{ steps.release.outputs.version }}-${{ matrix.arch }}.dmg
            target/stcode-release/Stcode-${{ steps.release.outputs.version }}-${{ matrix.arch }}.dmg.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos

    steps:
      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 64
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag }}"
          shopt -s nullglob
          assets=(dist/*)

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            exit 0
          fi

          create_args=(
            --title "Stcode $version"
            --notes "Automated Stcode release $version."
          )

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.draft }}" == "true" ]]; then
            create_args+=(--draft)
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          gh release create "$tag" "${assets[@]}" "${create_args[@]}"
