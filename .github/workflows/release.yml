name: Release Stcode

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version without the leading v"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean
  pull_request:
    types: [closed]
    branches:
      - main
      - codex/stcode-trim-test-fixtures

permissions:
  contents: write

concurrency:
  group: release-stcode
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_CHANNEL: stable

jobs:
  resolve-release:
    name: Resolve release
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      commit_sha: ${{ steps.release.outputs.commit_sha }}
      draft: ${{ steps.release.outputs.draft }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_notes: ${{ steps.release.outputs.release_notes }}

    steps:
      - name: Checkout tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRAFT: ${{ inputs.draft }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch)
              version="$INPUT_VERSION"
              commit_sha="$WORKFLOW_SHA"
              draft="$INPUT_DRAFT"
              prerelease="$INPUT_PRERELEASE"
              release_notes="Manual Stcode release $version."
              ;;
            pull_request)
              if [[ "$PR_MERGED" != "true" ]]; then
                echo "Pull request was closed without merge; no release will be created."
                exit 0
              fi

              git fetch --tags --force
              latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
              if [[ -z "$latest_tag" ]]; then
                version="1.0.0"
              else
                latest_version="${latest_tag#v}"
                IFS=. read -r major minor patch <<< "$latest_version"
                version="$major.$minor.$((patch + 1))"
              fi

              commit_sha="$MERGE_COMMIT_SHA"
              draft="false"
              prerelease="false"
              release_notes="Automated Stcode release $version from merged PR #$PR_NUMBER: $PR_TITLE."
              ;;
            *)
              echo "Unsupported release event: $EVENT_NAME" >&2
              exit 64
              ;;
          esac

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 64
          fi

          if [[ -z "$commit_sha" ]]; then
            echo "Could not resolve release commit SHA" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "commit_sha=$commit_sha"
            echo "draft=$draft"
            echo "prerelease=$prerelease"
            echo "release_notes<<EOF"
            echo "$release_notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS ${{ matrix.arch }} DMG
    needs: resolve-release
    if: ${{ needs.resolve-release.outputs.version != '' }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.commit_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: stcode-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            stcode-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Install cargo-bundle
        shell: bash
        run: |
          if ! cargo bundle --help >/dev/null 2>&1; then
            cargo install cargo-bundle --locked
          fi

      - name: Import macOS signing certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12" ]]; then
            echo "No signing certificate configured; using ad-hoc signing."
            exit 0
          fi

          keychain="$RUNNER_TEMP/stcode-release.keychain-db"
          certificate="$RUNNER_TEMP/stcode-release.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate"

          security create-keychain -p "" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "" "$keychain"
          security import "$certificate" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$keychain"

          if [[ -n "$MACOS_CODESIGN_IDENTITY" ]]; then
            echo "STCODE_CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "STCODE_CODESIGN_IDENTITY=Developer ID Application" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        shell: bash
        env:
          ZED_APP_VERSION: ${{ needs.resolve-release.outputs.version }}
          ZED_COMMIT_SHA: ${{ needs.resolve-release.outputs.commit_sha }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: script/stcode-release-macos "${{ needs.resolve-release.outputs.version }}" "${{ matrix.target }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: stcode-macos-${{ matrix.arch }}
          path: |
            target/stcode-release/Stcode-${{ needs.resolve-release.outputs.version }}-${{ matrix.arch }}.dmg
            target/stcode-release/Stcode-${{ needs.resolve-release.outputs.version }}-${{ matrix.arch }}.dmg.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - build-macos
    if: ${{ needs.resolve-release.outputs.version != '' }}

    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_COMMIT_SHA: ${{ needs.resolve-release.outputs.commit_sha }}
          RELEASE_DRAFT: ${{ needs.resolve-release.outputs.draft }}
          RELEASE_PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
          RELEASE_NOTES: ${{ needs.resolve-release.outputs.release_notes }}
        run: |
          version="$RELEASE_VERSION"
          tag="$RELEASE_TAG"
          shopt -s nullglob
          assets=(dist/*)

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded" >&2
            exit 1
          fi

          for arch in aarch64 x86_64; do
            dmg="dist/Stcode-$version-$arch.dmg"
            latest_dmg="dist/Stcode-latest-$arch.dmg"

            if [[ ! -f "$dmg" ]]; then
              echo "Missing release asset: $dmg" >&2
              exit 1
            fi

            cp "$dmg" "$latest_dmg"
            sha256sum "$latest_dmg" > "$latest_dmg.sha256"
          done

          assets=(dist/*)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            exit 0
          fi

          create_args=(
            --title "Stcode $version"
            --notes "$RELEASE_NOTES"
            --target "$RELEASE_COMMIT_SHA"
          )

          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            create_args+=(--draft)
          fi

          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          gh release create "$tag" "${assets[@]}" "${create_args[@]}"
