name: Release Stcode

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (vX.Y.Z) to (re)build artifacts for"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-stcode-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_CHANNEL: stable

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }} DMG
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    steps:
      - name: Resolve release info
        id: release
        shell: bash
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${EVENT_TAG:-$INPUT_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: '$tag'. Expected vX.Y.Z." >&2
            exit 64
          fi
          version="${tag#v}"
          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install sccache
        run: brew install sccache

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: stcode-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            stcode-release-${{ runner.os }}-${{ matrix.target }}-

      - name: Install cargo-bundle
        shell: bash
        run: |
          if ! cargo bundle --help >/dev/null 2>&1; then
            cargo install cargo-bundle --locked
          fi

      - name: Import macOS signing certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12" ]]; then
            echo "No signing certificate configured; using ad-hoc signing."
            exit 0
          fi

          keychain="$RUNNER_TEMP/stcode-release.keychain-db"
          certificate="$RUNNER_TEMP/stcode-release.p12"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate"

          security create-keychain -p "" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "" "$keychain"
          security import "$certificate" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$keychain"

          if [[ -n "$MACOS_CODESIGN_IDENTITY" ]]; then
            echo "STCODE_CODESIGN_IDENTITY=$MACOS_CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "STCODE_CODESIGN_IDENTITY=Developer ID Application" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        shell: bash
        env:
          ZED_APP_VERSION: ${{ steps.release.outputs.version }}
          ZED_COMMIT_SHA: ${{ github.sha }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: script/stcode-release-macos "${{ steps.release.outputs.version }}" "${{ matrix.target }}"

      - name: Upload DMG to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          dmg="target/stcode-release/Stcode-${VERSION}-${ARCH}.dmg"
          sha="$dmg.sha256"
          if [[ ! -f "$dmg" ]]; then
            echo "Missing release asset: $dmg" >&2
            exit 1
          fi
          mkdir -p dist
          latest_dmg="dist/Stcode-latest-${ARCH}.dmg"
          cp "$dmg" "$latest_dmg"
          sha256sum "$latest_dmg" > "$latest_dmg.sha256"
          gh release upload "$TAG" \
            "$dmg" "$sha" \
            "$latest_dmg" "$latest_dmg.sha256" \
            --clobber
